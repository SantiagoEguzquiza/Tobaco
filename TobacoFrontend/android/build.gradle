buildscript {
    ext.kotlin_version = '1.9.0'

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.2.1"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

// Define flutter properties globally
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new Exception("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

ext {
    flutterMinSdkVersion = 21
    flutterCompileSdkVersion = 34
    flutterTargetSdkVersion = 34
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    // Provide a 'flutter' ext only for legacy plugin subprojects (exclude ':app')
    if (project.name != "app") {
        ext.flutter = [
            compileSdkVersion: rootProject.ext.flutterCompileSdkVersion,
            minSdkVersion     : rootProject.ext.flutterMinSdkVersion,
            targetSdkVersion  : rootProject.ext.flutterTargetSdkVersion
        ]
    }
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                if (namespace == null) {
                    namespace project.group
                }

                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_11
                    targetCompatibility JavaVersion.VERSION_11
                }
                
                if (compileSdk == null || compileSdk == 0) {
                    compileSdk rootProject.ext.flutterCompileSdkVersion
                }
                
                defaultConfig {
                    if (minSdk == null || minSdk == 0) {
                        minSdk rootProject.ext.flutterMinSdkVersion
                    }
                }
            }
        }
        project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "11"
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}